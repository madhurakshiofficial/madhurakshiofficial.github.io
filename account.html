<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account — Madhurakshi</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --crimson: #8b0000; --crimson-light: #a31515;
      --gold: #c9a84c; --gold-light: #e8c97e;
      --cream: #fdf6ee; --text-brown: #5c3d2e; --text-light: #8a6a5a; --white: #ffffff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { font-family:'Poppins',sans-serif; background:var(--cream); color:var(--text-brown); min-height:100vh; }

    /* HEADER */
    header { display:flex; justify-content:space-between; align-items:center; padding:16px 32px; background:var(--white); box-shadow:0 1px 12px rgba(139,0,0,0.08); position:sticky; top:0; z-index:100; }
    .logo-text { font-family:'Cinzel',serif; letter-spacing:3px; color:var(--crimson); font-weight:500; font-size:1.25rem; text-decoration:none; }
    .header-right { display:flex; align-items:center; gap:20px; }
    .header-link { font-size:0.85rem; color:var(--crimson); text-decoration:none; display:flex; align-items:center; gap:6px; font-weight:500; transition:opacity 0.2s; }
    .header-link:hover { opacity:0.7; }

    /* PAGE */
    .page { max-width:720px; margin:0 auto; padding:40px 32px 60px; animation:fadeUp 0.5s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    .page-tag { font-size:0.68rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold); font-weight:500; margin-bottom:8px; }
    .page-title { font-family:'Playfair Display',serif; font-size:2.4rem; color:var(--crimson); font-weight:400; line-height:1.1; margin-bottom:28px; }
    .page-title em { font-style:italic; }

    /* PROFILE CARD */
    .profile-card { background:var(--white); border:1px solid rgba(139,0,0,0.12); border-radius:16px; padding:24px 28px; margin-bottom:20px; display:flex; align-items:center; gap:24px; box-shadow:0 2px 12px rgba(139,0,0,0.06); }
    .avatar-ring { width:68px; height:68px; border-radius:50%; border:2px solid var(--gold-light); display:flex; align-items:center; justify-content:center; flex-shrink:0; background:var(--cream); }
    .avatar-initials { font-family:'Playfair Display',serif; font-size:1.7rem; font-weight:400; color:var(--crimson); letter-spacing:0.05em; }
    .profile-info { flex:1; min-width:0; }
    .profile-name { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:400; color:var(--text-brown); margin-bottom:3px; }
    .profile-email { font-size:0.78rem; color:var(--text-light); }
    .profile-badge { display:inline-flex; align-items:center; gap:5px; margin-top:8px; padding:3px 10px; border-radius:20px; background:var(--cream); border:1px solid rgba(139,0,0,0.1); font-size:0.65rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-light); }
    .profile-badge .dot { width:5px; height:5px; border-radius:50%; background:#2e7d32; }

    /* SECTION */
    .section { margin-bottom:18px; }
    .section-label { font-size:0.65rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold); font-weight:500; margin-bottom:10px; padding-left:4px; }
    .card { background:var(--white); border:1px solid rgba(139,0,0,0.1); border-radius:14px; overflow:hidden; box-shadow:0 2px 8px rgba(139,0,0,0.04); }

    /* MENU ROWS */
    .menu-row { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid rgba(139,0,0,0.07); cursor:pointer; transition:background 0.15s; text-decoration:none; color:inherit; }
    .menu-row:last-child { border-bottom:none; }
    .menu-row:hover { background:var(--cream); }
    .menu-row__left { display:flex; align-items:center; gap:14px; }
    .menu-icon { width:36px; height:36px; border-radius:10px; background:var(--cream); border:1px solid rgba(139,0,0,0.1); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--crimson); }
    .menu-row__title { font-size:0.85rem; font-weight:500; color:var(--text-brown); }
    .menu-row__sub { font-size:0.72rem; color:var(--text-light); margin-top:2px; }
    .menu-row__right { display:flex; align-items:center; gap:10px; }
    .menu-badge { display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:20px; padding:0 6px; border-radius:20px; background:rgba(139,0,0,0.08); border:1px solid rgba(139,0,0,0.12); font-size:0.7rem; color:var(--crimson); font-weight:500; }
    .menu-arrow { color:var(--text-light); transition:color 0.18s; }
    .menu-row:hover .menu-arrow { color:var(--crimson); }

    /* LOGOUT */
    .btn-logout { width:100%; padding:14px; background:transparent; color:var(--crimson); border:1.5px solid rgba(139,0,0,0.25); border-radius:50px; font-family:'Poppins',sans-serif; font-size:0.85rem; font-weight:400; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:all 0.2s; }
    .btn-logout:hover { background:#fff5f5; border-color:var(--crimson); }
    .btn-logout:disabled { opacity:0.5; cursor:not-allowed; }

    /* LOADING */
    .loading-guard { min-height:60vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; }
    .loading-ring { width:30px; height:30px; border:2px solid #e8d5be; border-top-color:var(--crimson); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-text { font-size:0.82rem; color:var(--text-light); }

    /* TOAST */
    #toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:#1a1a1a; color:#fff; padding:12px 24px; border-radius:30px; font-size:0.85rem; z-index:999; opacity:0; transition:all 0.3s; pointer-events:none; font-family:'Poppins',sans-serif; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    @media(max-width:600px) { header{padding:14px 20px;} .page{padding:28px 16px 50px;} .profile-card{flex-direction:column;align-items:flex-start;gap:16px;padding:18px;} }
    ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:#d4a373;border-radius:4px;}
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <a href="index.html" class="logo-text">MADHURAKSHI</a>
  <div class="header-right">
    <!--<a href="index.html" class="header-link">← Back to Collection</a>-->
  </div>
</header>

<!-- APP MOUNT -->
<div id="app">
  <div class="loading-guard">
    <div class="loading-ring"></div>
    <p class="loading-text">Loading your account…</p>
  </div>
</div>

<div id="toast"></div>

<!-- FOOTER -->
<div style="background:linear-gradient(to bottom,#8b0000,#5a0000);color:#fff;text-align:center;padding:24px;font-size:12px;color:#f5dada;margin-top:20px;">
  © 2026 Madhurakshi — <a href="index.html" style="color:#c9a27a;text-decoration:none;">Back to Home</a>
</div>

<script>
const SUPABASE_URL='https://cvhepeydpmxmwjmenrqz.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2aGVwZXlkcG14bXdqbWVucnF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MTk2OTksImV4cCI6MjA5MTE5NTY5OX0.hLDAcPvwfk3w7K8_YRZwAu55kK_hEAbevPQd-fkDNl8';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function getInitials(name,email){if(name)return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();return email?email[0].toUpperCase():'??';}

async function renderAccount(user){
  const name=user.user_metadata?.full_name||'';
  const email=user.email||'';
  const initials=getInitials(name,email);
  const memberSince=new Date(user.created_at).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const[{count:wishCount},{count:cartCount}]=await Promise.all([
    sb.from('wishlist').select('*',{count:'exact',head:true}).eq('user_id',user.id),
    sb.from('cart').select('*',{count:'exact',head:true}).eq('user_id',user.id)
  ]);

  document.getElementById('app').innerHTML=`
    <main class="page">
      <p class="page-tag">✦ Your account</p>
      <h1 class="page-title">Hello, <em>${name.split(' ')[0]||'there'}</em></h1>

      <div class="profile-card">
        <div class="avatar-ring"><span class="avatar-initials">${initials}</span></div>
        <div class="profile-info">
          <div class="profile-name">${name||'My Account'}</div>
          <div class="profile-email">${email}</div>
          <div class="profile-badge"><span class="dot"></span> Member since ${memberSince}</div>
        </div>
      </div>

      <div class="section">
        <p class="section-label">Shopping</p>
        <div class="card">
          <a href="cart.html" class="menu-row">
            <div class="menu-row__left">
              <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg></div>
              <div><div class="menu-row__title">My Cart</div><div class="menu-row__sub">Review and checkout your bag</div></div>
            </div>
            <div class="menu-row__right">${cartCount>0?`<span class="menu-badge">${cartCount}</span>`:''}<span class="menu-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg></span></div>
          </a>
          <a href="wishlist.html" class="menu-row">
            <div class="menu-row__left">
              <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></div>
              <div><div class="menu-row__title">Wishlist</div><div class="menu-row__sub">Pieces you've saved for later</div></div>
            </div>
            <div class="menu-row__right">${wishCount>0?`<span class="menu-badge">${wishCount}</span>`:''}<span class="menu-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg></span></div>
          </a>
          <a href="#" class="menu-row" onclick="comingSoon(event,'Orders')">
            <div class="menu-row__left">
              <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></div>
              <div><div class="menu-row__title">My Orders</div><div class="menu-row__sub">Track and manage your purchases</div></div>
            </div>
            <span class="menu-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg></span>
          </a>
        </div>
      </div>

      <div class="section">
        <p class="section-label">Settings</p>
        <div class="card">
          <a href="#" class="menu-row" onclick="comingSoon(event,'Profile Settings')">
            <div class="menu-row__left">
              <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
              <div><div class="menu-row__title">Profile & Details</div><div class="menu-row__sub">Name, address, preferences</div></div>
            </div>
            <span class="menu-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg></span>
          </a>
          <a href="#" class="menu-row" onclick="comingSoon(event,'Security')">
            <div class="menu-row__left">
              <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
              <div><div class="menu-row__title">Password & Security</div><div class="menu-row__sub">Update your login credentials</div></div>
            </div>
            <span class="menu-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg></span>
          </a>
        </div>
      </div>

      <div class="section">
        <p class="section-label">Session</p>
        <button class="btn-logout" id="logoutBtn" onclick="handleLogout()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out of Madhurakshi
        </button>
      </div>
    </main>`;
}

async function handleLogout(){
  const btn=document.getElementById('logoutBtn');
  btn.disabled=true; btn.textContent='Signing out…';
  await sb.auth.signOut();
  showToast('Signed out. See you soon!');
  setTimeout(()=>{window.location.href='/';},1200);
}
function comingSoon(e,section){e.preventDefault();showToast(section+' coming soon ✨');}

sb.auth.getSession().then(({data:{session}})=>{if(session)renderAccount(session.user);});
sb.auth.onAuthStateChange((event,session)=>{
  if(event==='SIGNED_IN'&&session)renderAccount(session.user);
  else if(event==='SIGNED_OUT')window.location.href='auth.html';
  else if(event==='INITIAL_SESSION'&&!session)window.location.href='auth.html';
});
</script>
</body>
</html>
