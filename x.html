<!-- SIZE BAR -->
<div class="md-size-bar" onclick="openSizeChart()">
  <div class="md-size-left">
    <span class="md-icon">📏</span>
    <span class="md-text">SIZE CHART</span>
    <span class="md-arrow">›</span>
  </div>
  <div class="md-divider"></div>
</div>

<p class="md-size-info">
  If you're not sure what your size is, please click on ‘SIZE CHART'.
</p>

<!-- MODAL -->
<div id="mdSizeModal" class="md-modal">
  <div class="md-modal-content">
    <span class="md-close" onclick="closeSizeChart()">&times;</span>

    <h2 class="md-title">Women's Size Chart</h2>

    <div class="md-table-wrapper">
      <table class="md-table">
        <thead>
          <tr>
            <th>Size</th><th>Chest</th><th>Waist</th><th>Hips</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>XXS</td><td>30</td><td>24</td><td>35</td></tr>
          <tr><td>XS</td><td>32</td><td>26</td><td>37</td></tr>
          <tr><td>S</td><td>34</td><td>28</td><td>39</td></tr>
          <tr><td>M</td><td>36</td><td>30</td><td>41</td></tr>
          <tr><td>L</td><td>38</td><td>32</td><td>43</td></tr>
          <tr><td>XL</td><td>40</td><td>34</td><td>45</td></tr>
          <tr><td>XXL</td><td>42</td><td>36</td><td>47</td></tr>
          <tr><td>XXXL</td><td>44</td><td>38</td><td>49</td></tr>
          <tr><td>4XL</td><td>46</td><td>40</td><td>51</td></tr>
          <tr><td>5XL</td><td>48</td><td>42</td><td>53</td></tr>
        </tbody>
      </table>
    </div>

    <p class="md-note">All measurements are in inches</p>
    <p class="md-note">Need a custom fit? We’ll tailor it for you ✨</p>
  </div>
</div>

<style>
/* TOP BAR */
.md-size-bar{
  background:#e8d5c4;   /* darker than bottom box */
  padding:14px 16px;
  display:flex;
  align-items:center;
  position:relative;
  cursor:pointer;

  border-radius:10px 10px 0 0;
}

.md-size-info{
  background:#f3ece4;   /* lighter */
  padding:14px 16px;
  font-size:14px;
  color:#6b4a34;

  border-top:1px solid #d8cbbd;
  border-radius:0 0 10px 10px;
  margin:0;
}

.md-size-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.md-text{
  color:#2b1a12;
  font-weight:600;
  letter-spacing:1px;
}

.md-icon,.md-arrow{color:#2b1a12}

.md-divider{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:1px;
  height:28px;
  background:#8c8c8c;
}


/* MODAL */
.md-modal{
  display:none;
  position:fixed;
  inset:0;
  z-index:999;
  background:rgba(0,0,0,0.5);
}

.md-modal-content{
  background:#fdf6ee;
  margin:5% auto;
  padding:24px;
  width:90%;
  max-width:750px;
  border-radius:12px;
}

/* MOBILE */
@media(max-width:768px){
  .md-modal-content{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    margin:0;
    border-radius:16px 16px 0 0;
    max-height:85vh;
    overflow-y:auto;
    padding:20px;
  }
}

.md-title{
  text-align:center;
  font-family:'Playfair Display',serif;
  color:#8b0000;
  margin-bottom:15px;
  font-size:18px;
}

.md-close{
  float:right;
  font-size:22px;
  cursor:pointer;
}

.md-table-wrapper{overflow-x:auto}

.md-table{
  width:100%;
  min-width:500px;
  border-collapse:collapse;
}

.md-table th{
  background:#e8d5c4;
  color:#8b0000;
  padding:10px;
}

.md-table td{
  padding:8px;
  color:#6b4a34;
}

.md-table th,.md-table td{
  border-bottom:1px solid #ddd;
  text-align:center;
}

.md-table tr:hover{background:#f5ebe3}

.md-note{
  margin-top:10px;
  font-size:13px;
  color:#6b4a34;
  text-align:center;
}
</style>

<script>
function openSizeChart(){
  document.getElementById("mdSizeModal").style.display="block";
}

function closeSizeChart(){
  document.getElementById("mdSizeModal").style.display="none";
}

window.onclick=function(e){
  let m=document.getElementById("mdSizeModal");
  if(e.target==m){m.style.display="none";}
}
</script>
